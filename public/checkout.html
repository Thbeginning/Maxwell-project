<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | World Cup 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">FIFA <span>2026</span></a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <section class="section-container" style="max-width: 600px; margin: auto;">
        <h2 class="section-title">Checkout</h2>
        <div style="background: white; padding: 2rem; border-radius: var(--border-radius); box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
            <form id="checkout-form">
                <h3>Personal Details</h3>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="c-name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="c-email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="c-phone" class="form-control" required>
                </div>

                <h3 style="margin-top: 2rem;">Payment Details (Mock)</h3>
                <div class="form-group">
                    <label>Card Number</label>
                    <input type="text" id="c-card" class="form-control" placeholder="1234 5678 9101 1121" required>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label>Expiry Date</label>
                        <input type="text" id="c-exp" class="form-control" placeholder="MM/YY" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>CVV</label>
                        <input type="text" id="c-cvv" class="form-control" placeholder="123" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-accent" style="width: 100%; margin-top: 1rem;">Pay Now</button>
            </form>
        </div>
    </section>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.getElementById('checkout-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.textContent = 'Processing...';
            btn.disabled = true;

            const bookingData = {
                name: document.getElementById('c-name').value,
                email: document.getElementById('c-email').value,
                phone: document.getElementById('c-phone').value,
                payment_status: 'Paid'
            };

            // Simulate payment delay
            setTimeout(async () => {
                const res = await window.api.createBooking(bookingData);
                if (res.success) {
                    window.location.href = `confirmation.html?ref=${res.booking.booking_ref}&email=${encodeURIComponent(bookingData.email)}`;
                } else {
                    alert('Payment failed, please try again.');
                    btn.textContent = 'Pay Now';
                    btn.disabled = false;
                }
            }, 1500);
        });
    </script>
</body>
</html>
